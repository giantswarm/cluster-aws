{{- $_ := set $ "appName" "external-dns-crossplane-resources" }}
{{- if include "cluster.app.in-release" $ | eq "true" }}
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ printf "%s-external-dns-crossplane-resources" (include "resource.default.name" $) | quote }}
  namespace: {{ $.Release.Namespace | quote }}
spec:
  url: oci://gsoci.azurecr.io/charts/giantswarm/external-dns-crossplane-resources
  ref:
    tag: "{{ include "cluster.app.version" $ }}"
  interval: 24h
  timeout: 60s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ printf "%s-external-dns-crossplane-resources" (include "resource.default.name" $) | quote }}
  namespace: {{ $.Release.Namespace | quote }}
spec:
  releaseName: {{ printf "%s-external-dns-crossplane-resources" (include "resource.default.name" $) }}
  targetNamespace: {{ $.Release.Namespace }}
  storageNamespace: {{ $.Release.Namespace }}
  chartRef:
    kind: OCIRepository
    name: {{ printf "%s-external-dns-crossplane-resources" (include "resource.default.name" $) }}
  serviceAccountName: automation
  interval: 5m
  install:
    timeout: 10m
    remediation:
      retries: -1
  upgrade:
    timeout: 10m
    remediation:
      retries: -1
  valuesFrom:
    # Created by aws-crossplane-cluster-config-operator once the cluster gets provisioned
    - kind: ConfigMap
      name: {{ printf "%s-crossplane-config" (include "resource.default.name" $) | quote }}
      valuesKey: values
      optional: false
{{- end }}
