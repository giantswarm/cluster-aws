{{- /* AWS-specific cert-manager Helm values */}}
{{- /* https://github.com/giantswarm/cert-manager-app/blob/main/helm/cert-manager/values.yaml */}}
{{- define "awsCertManagerHelmValues" }}
{{- $_ := set $ "appName" "cert-manager-crossplane-resources" }}
{{- if and (include "useCertManagerDnsChallenges" $ | eq "true") (include "cluster.app.in-release" $ | eq "true") }}
{{- /* Get cert-manager version. */}}
{{- $version := "N/A" }}
{{- if .Values.providerIntegration.useReleases }}
{{- $_ := set $ "appName" "cert-manager" }}
{{- $version = include "cluster.app.version" $ | trim }}
{{- end }}
{{- /* Check cert-manager version. Since v4.0.0, upstream properties need to be under the `cert-manager` key. */}}
{{- if or (eq $version "N/A") (semverCompare ">=4.0.0" $version) }}
cert-manager:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:{{ include "aws-partition" $ }}:iam::{{ include "aws-account-id" $ }}:role/{{ include "resource.default.name" $ }}-cert-manager
{{- else }}
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: arn:{{ include "aws-partition" $ }}:iam::{{ include "aws-account-id" $ }}:role/{{ include "resource.default.name" $ }}-cert-manager
{{- end }}

{{- /* Top-level custom properties (independent of upstream). */}}
giantSwarmClusterIssuer:
  acme:
    dns01:
      route53:
        enabled: true
        region: {{ include "aws-region" . }}
    http01:
      enabled: false
{{- end }}
