{{ if (include "useCertManagerDnsChallenges" $ | eq "true") }}
{{- $_ := set $ "appName" "cert-manager-crossplane-resources" }}
{{- /* Check if app is in Release CR */}}
{{- if include "cluster.app.in-release" $ | eq "true" }}
{{- $resourceName := printf "%s-cert-manager-crossplane-resources" (include "resource.default.name" $) }}
{{- $truncatedResourceName := trunc 53 $resourceName }}
apiVersion: v1
data:
  values: |
    clusterName: {{ include "resource.default.name" $ }}
    # Configure the AWS provider
    providers:
      aws:
        enabled: true
        accountID: {{ include "aws-account-id" $ | quote }}
        partition: {{ include "aws-partition" $ }}
        region: {{ include "aws-region" $ }}
        oidc:
          domain: {{ include "aws-oidc-domain" $ | quote }}
        serviceType: managed
kind: ConfigMap
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $truncatedResourceName | quote }}
  namespace: {{ $.Release.Namespace | quote }}
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  labels:
    {{- include "labels.common" $ | nindent 4 }}
  name: {{ $truncatedResourceName | quote }}
  namespace: {{ $.Release.Namespace | quote }}
spec:
  releaseName: {{ $truncatedResourceName }}
  targetNamespace: {{ $.Release.Namespace }}
  storageNamespace: {{ $.Release.Namespace }}
  chart:
    spec:
      chart: cert-manager-crossplane-resources
      version: {{ include "cluster.app.version" $ }}
      sourceRef:
        kind: HelmRepository
        name: {{ include "resource.default.name" $ }}-{{ include "cluster.app.catalog" $ }}
  serviceAccountName: automation
  interval: 5m
  install:
    timeout: 10m
    remediation:
      retries: -1
  upgrade:
    timeout: 10m
    remediation:
      retries: -1
  valuesFrom:
    # See above
    - kind: ConfigMap
      name: {{ $truncatedResourceName | quote }}
      valuesKey: values
      optional: false
    # Created by aws-crossplane-cluster-config-operator once the cluster gets provisioned
    - kind: ConfigMap
      name: {{ printf "%s-crossplane-config" (include "resource.default.name" $) | quote }}
      valuesKey: values
      optional: false
{{- end }}
{{- end }}
