apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: OCIRepository
metadata:
  name: {{ include "resource.default.name" . }}-aws-ebs-csi-driver-smons
  namespace: {{ .Release.Namespace }}
  annotations:
    cluster.giantswarm.io/description: "{{ .Values.global.metadata.description }}"
  labels:
    cluster-apps-operator.giantswarm.io/watching: ""
    {{- include "labels.common" . | nindent 4 }}
spec:
  {{- $_ := set $ "appName" "aws-ebs-csi-driver-servicemonitors" }}
  url: oci://gsoci.azurecr.io/charts/giantswarm/aws-ebs-csi-driver-servicemonitors
  ref:
    tag: "{{ include "cluster.app.version" $ }}"
  interval: 24h
  timeout: 60s
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: {{ include "resource.default.name" . }}-aws-ebs-csi-driver-smons
  namespace: {{ .Release.Namespace }}
  annotations:
    cluster.giantswarm.io/description: "{{ .Values.global.metadata.description }}"
  labels:
    cluster-apps-operator.giantswarm.io/watching: ""
    {{- include "labels.common" . | nindent 4 }}
spec:
  # Keep the pre-migration release name (`aws-ebs-csi-driver-smons`) so the HR
  # adopts the existing chart-operator-installed helm release on the WC instead
  # of leaving it orphaned and creating a parallel `aws-ebs-csi-driver-servicemonitors`
  # release. The chart pulled by chartRef is still `aws-ebs-csi-driver-servicemonitors`
  # — helm doesn't require the chart name and release name to match.
  releaseName: aws-ebs-csi-driver-smons
  targetNamespace: kube-system
  storageNamespace: kube-system
  chartRef:
    kind: OCIRepository
    name: {{ include "resource.default.name" . }}-aws-ebs-csi-driver-smons
  dependsOn:
    - name: {{ include "resource.default.name" . }}-prometheus-operator-crd
      namespace: {{ .Release.Namespace }}
  kubeConfig:
    secretRef:
      name: {{ include "resource.default.name" . }}-kubeconfig
  interval: 5m
  install:
    remediation:
      retries: -1
      remediateLastFailure: false
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: false
  {{- if .Values.global.apps.awsEbsCsiDriverServiceMonitors.extraConfigs }}
  valuesFrom:
  {{- range .Values.global.apps.awsEbsCsiDriverServiceMonitors.extraConfigs }}
  - kind: {{ .kind }}
    name: {{ .name }}
    valuesKey: values
    optional: {{ .optional | default false }}
  {{- end }}
  {{- end }}
